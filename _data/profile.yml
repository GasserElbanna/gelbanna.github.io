short_bio_text_justify: false
short_bio: >-
  <p>
    I study how humans perceive, understand, and produce speech. To investigate these phenomena, I build computational models that can reproduce human behavior and generate testable predictions about the perceptual and neural basis of human spoken communication.
  </p>
  <p>
    I am currently a third-year PhD student in the <a href="https://shbtphd.hms.harvard.edu/" target="_blank">Speech and Hearing Bioscience and Technology (SHBT) Program</a> at Harvard University. I conduct my research in the <a href="https://mcdermottlab.mit.edu/" target="_blank">Laboratory for Computational Audition</a> at MIT, where I am advised by <a href="https://web.mit.edu/jhm/www/" target="_blank">Josh McDermott</a>.
  </p>
  <p>
    I earned my B.Sc. in Systems and Biomedical Engineering from Cairo University (Egypt). During my undergraduate studies, I worked on developing computational models of motor neurons to study the early stages of ALS (<a href="https://drive.google.com/file/d/1y0lKEGa-Xh_YNzmdLjKx5sp_E8GUnZEV/view" target="_blank"><em>Thesis</em></a>).
  </p>
  <p>
    I later completed a M.Sc. in Neuroscience and Neuroengineering at EPFL (Switzerland), where I was introduced to speech machine learning and cognitive neuroscience. As a <a href="https://bertarelli.hms.harvard.edu/people/gasser-elbanna" target="_blank">Bertarelli fellow</a>, I headed to HMS and MIT to do my master’s thesis in the <a href="https://sensein.group/" target="_blank">Senseable Intelligence Group</a> with <a href="https://oto.hms.harvard.edu/people/satrajit-ghosh" target="_blank">Satrajit Ghosh</a> on studying how humans and artificial neural network models recognize  and represent voices (<a href="https://arxiv.org/abs/2406.10401" target="_blank"><em>Thesis</em></a>).
  </p>

